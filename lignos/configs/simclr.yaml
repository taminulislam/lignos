# SimCLR Self-Supervised Pre-training Configuration
# Pre-trains ViT-Tiny on 1,500 iThermo IL COSMO surfaces

data:
  image_dir: "../data/pipeline/cosmo_images"
  n_views_per_molecule: 36
  image_size: 224
  positive_pair_strategy: "rotation"  # two random rotation views of same molecule
  num_workers: 8

augmentations:
  random_resized_crop:
    scale: [0.6, 1.0]
    ratio: [0.75, 1.33]
  gaussian_blur:
    probability: 0.5
    kernel_size: 23
  color_jitter:
    probability: 0.8
    brightness: 0.3
    contrast: 0.3
    saturation: 0.2
    hue: 0.1
  horizontal_flip: false  # not physically meaningful for molecular surfaces

model:
  encoder: "vit_tiny"
  embed_dim: 192
  patch_size: 16
  num_layers: 6
  num_heads: 3
  mlp_ratio: 4
  stochastic_depth: 0.1
  projection_dim: 128
  projection_hidden: 256

training:
  optimizer: "lars"
  base_lr: 0.3
  weight_decay: 1.0e-6
  momentum: 0.9
  temperature: 0.07
  epochs: 200
  batch_size: 256
  warmup_epochs: 10
  scheduler: "cosine"
  fp16: true

compute:
  gpus: 4
  distributed: true
  sync_bn: true

output:
  checkpoint_dir: "checkpoints/simclr"
  save_every: 20
  log_every: 10
